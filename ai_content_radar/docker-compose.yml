version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: content_radar_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_content_radar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: content_radar_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
